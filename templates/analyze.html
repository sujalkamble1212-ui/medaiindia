{% extends "base.html" %}

{% block content %}

<div class="dashboard-container">

    <div class="dashboard-header">
        <h2>AI Disease Prediction</h2>

        <p>
            Welcome {{ user.username }} 👋
            Select symptoms and get instant AI insights.
        </p>
    </div>

    <div class="card">

        <h3>Select Symptoms</h3>

        <input
            type="text"
            id="search"
            placeholder="🔍 Search symptom..."
            onkeyup="filterSymptoms()"
            class="search-box"
        >

        <div class="symptoms-grid" id="symptomList">

            {% for symptom in symptoms %}

            <label class="symptom-item">

                <input
                    type="checkbox"
                    class="symptom"
                    value="{{ symptom }}"
                >

                <span>{{ symptom }}</span>

            </label>

            {% endfor %}

        </div>

        <div class="btn-group">

            <button
                type="button"
                onclick="predict()"
                class="btn-primary"
            >

                Predict

            </button>

        </div>

        <div
            id="analysis"
            class="analysis-text"
        ></div>

        <div
            id="loading"
            class="hidden loading"
        >

            🔄 AI analyzing...

        </div>

        <div
            id="result"
            class="result-box"
        ></div>

    </div>

</div>

<script>

function getData(){

    let data={}

    document.querySelectorAll(".symptom").forEach(cb=>{

        data[cb.value]=cb.checked ? 1 : 0

    })

    return data
}

function analyze(){

    let count=Object.values(

        getData()

    ).filter(v=>v==1).length

    document.getElementById(

        "analysis"

    ).innerHTML=

        "Selected Symptoms: "+count
}

function predict(){

    let count=Object.values(

        getData()

    ).filter(v=>v==1).length

    if(count===0){

        alert("Please select at least one symptom")

        return
    }

    document.getElementById(

        "loading"

    ).classList.remove("hidden")

    fetch("/predict",{

        method:"POST",

        headers:{

            "Content-Type":"application/json"
        },

        body:JSON.stringify(
            getData()
        )

    })

    .then(res=>res.json())

    .then(data=>{

        document.getElementById(

            "loading"

        ).classList.add("hidden")

        document.getElementById(

            "result"

        ).innerHTML=`

            <h3>
                Prediction: ${data.predicted_disease}
            </h3>

            <p style="margin-top:10px;">
                Confidence: ${data.probability}%
            </p>

        `
    })
}

function filterSymptoms(){

    let input=document.getElementById(

        "search"

    ).value.toLowerCase()

    let items=document.querySelectorAll(

        ".symptom-item"
    )

    items.forEach(item=>{

        let text=item.innerText.toLowerCase()

        item.style.display=

            text.includes(input)

            ? "block"

            : "none"
    })
}

document.querySelectorAll(".symptom").forEach(cb=>{

    cb.addEventListener(

        "change",

        analyze
    )

})

</script>
